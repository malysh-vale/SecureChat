  <!-- FULLSCREEN APP STYLE -->
  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,
    body,
    #root{
      width:100%;
      height:100%;
      overflow:hidden;
      background:#111827;
      font-family:sans-serif;
    }

    body{
      position:fixed;
      inset:0;
      overscroll-behavior:none;

  <!-- STRUCTURED DATA -->
  <script type="application/ld+json">
  {
    "@context":"https://schema.org",
    "@type":"WebApplication",
    "name":"SecureChat",
    "description":"Mensajeria cifrada de extremo a extremo",
    "url":"https://securechat-pjgw745n.manus.space/",

<body>

  <div id="root"></div>

  <!-- REACT -->
  <script type="module" src="/src/main.tsx"></script>

  <!-- MOBILE PATCH -->
  <script src="/mobile-patch.js" defer></script>

  <!-- SERVICE WORKER -->
  <script>
    if ('serviceWorker' in navigator) {

      window.addEventListener('load', () => {

        navigator.serviceWorker.register('/sw.js')
          .then((registration) => {

            console.log(
              'Service Worker registrado:',
              registration
            );

            setInterval(() => {
              registration.update();
            }, 3600000);

          })
          .catch((error) => {

            console.log(
              'Error al registrar Service Worker:',
              error
            );

          });

      });

    }
  </script>

</body>
